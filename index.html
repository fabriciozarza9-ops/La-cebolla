<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Club Renacidos FC | Oficial 🏆</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-gold: #C5A059;
            --background-dark: #0A0F1E;
            --card-bg: rgba(20, 27, 45, 0.9);
            --text-white: #FFFFFF;
            --btn-whatsapp: #25D366;
            --btn-gps: #4285F4;
            --btn-group: #0088CC; /* Un azul diferente para el grupo */
            --shadow-gold: 0 4px 15px rgba(197, 160, 89, 0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: var(--text-white);
            line-height: 1.6;
            padding-bottom: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* FONDO ANIMADO DE PELOTAS REBOTANDO */
        .balls-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; opacity: 0.05; /* Muy sutil para no tapar el texto */
            pointer-events: none;
        }

        /* HEADER */
        header {
            padding: 40px 20px;
            text-align: center;
            background: linear-gradient(180deg, #000 0%, transparent 100%);
            position: relative;
            z-index: 1;
        }

        .logo-container {
            width: 150px; height: 50px;
            border-radius: 25px;
            background: #000;
            border: 2px solid var(--primary-gold);
            box-shadow: 0 0 15px var(--primary-gold);
            margin: 0 auto 20px;
            display: flex; align-items: center; justify-content: center;
        }
        .logo-text { font-size: 0.8em; color: var(--text-white); font-weight: bold; text-transform: uppercase; }

        h1 { font-size: 1.8em; color: var(--primary-gold); font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .location { font-size: 0.9em; margin-top: 5px; opacity: 0.8; }

        .btn-free {
            display: inline-flex; align-items: center; gap: 8px;
            background-color: #A00; color: white;
            padding: 12px 24px; border-radius: 25px;
            font-size: 0.8em; font-weight: bold;
            text-decoration: none; margin-top: 20px;
            text-transform: uppercase;
        }

        /* DIVIDER */
        .divider { height: 4px; background-color: var(--primary-gold); width: 100%; position: relative; z-index: 1; }

        .container { padding: 20px; position: relative; z-index: 1; }

        /* CARDS */
        .card {
            background-color: var(--card-bg);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(5px); /* Efecto vidrio esmerilado suave */
        }

        h2 { font-size: 1.4em; color: var(--primary-gold); display: flex; align-items: center; gap: 10px; text-transform: uppercase; margin-bottom: 15px; }
        h2 i { color: var(--primary-gold); font-size: 1.2em; }
        p { font-size: 0.95em; opacity: 0.9; margin-bottom: 10px; }

        /* MAPA */
        .map-wrapper { width: 100%; height: 180px; border-radius: 10px; overflow: hidden; margin-top: 15px; border: 2px solid var(--primary-gold); }
        .map-frame { width: 100%; height: 100%; border: none; }
